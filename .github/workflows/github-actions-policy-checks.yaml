name: GitHub Actions Policy Checks

on:
  pull_request:
    paths:
      - ".github/**"
  push:
    branches: [main]
    paths:
      - ".github/**"
  workflow_dispatch:

permissions: {}

jobs:
  policy-checks:
    permissions:
      contents: read
      security-events: write
    uses: eclipse-uprotocol/ci-cd/.github/workflows/github-actions-policy-checks.yaml@ad3f99eac0675c714f08c473412dae14d9fecaa8 # main
